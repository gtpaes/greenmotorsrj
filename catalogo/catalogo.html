<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMotors — Catálogo</title>

<link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ─── TOKENS ─── */
:root {
  --green:      #00ff88;
  --green-dim:  rgba(0,255,136,0.12);
  --green-glow: rgba(0,255,136,0.35);
  --bg:         #050505;
  --glass:      rgba(255,255,255,0.04);
  --border:     rgba(255,255,255,0.08);
  --text:       #fff;
  --muted:      #71717a;
}
 
/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; }
 
/* ─── CANVAS BG ─── */
canvas {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}
 
/*  HEADER  */
.header {
  padding: 16px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 1140px;
  margin: 0 auto;
  width: 100%;
}
 
/* TOP ROW */
.header-top {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}
 
.logo {
  width: 58px;
  justify-self: center;
}
 
/* ── BOTÃO VOLTAR ── */
.btn-back {
  justify-self: start;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--green);
  color: #000;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 9px 18px 9px 14px;
  border: none;
  border-radius: 30px;
  box-shadow: 0 0 18px var(--green-glow);
  transition: transform .2s, box-shadow .2s;
}
.btn-back:hover {
  transform: translateX(-3px);
  box-shadow: 0 0 30px var(--green-glow);
}
.btn-back svg { flex-shrink: 0; }
 
/* ── SEARCH ROW ── */
.header-search {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
}
 
.search-spacer { display: none; }
 
.search-container { position: relative; width: 100%; }
 
.search-container input {
  width: 100%;
  padding: 11px 18px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-container input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(0,255,136,.10);
}
.search-container input::placeholder { color: var(--muted); }
 
/* Sugestões */
#suggestions {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  width: 100%;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: none;
  z-index: 100;
}
#suggestions div {
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  transition: background .15s, color .15s;
}
#suggestions div:hover { background: var(--green); color: #000; }
 
/* ── FILTRO WRAPPER ── */
.filter-btn-wrapper {
  position: relative;
  display: inline-block;
}
 
.btn-filter {
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  letter-spacing: .04em;
  padding: 10px 18px;
  border-radius: 30px;
  white-space: nowrap;
  transition: border-color .2s, background .2s;
}
.btn-filter:hover,
.btn-filter.open { border-color: var(--green); background: var(--green-dim); }
 
.filter-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 220px;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  z-index: 200;
  display: none;
  box-shadow: 0 14px 40px rgba(0,0,0,.7);
}
.filter-dropdown.open { display: block; }
 
.filter-header {
  padding: 10px 16px 8px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
 
.filter-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  font-size: 14px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text);
  width: 100%;
  text-align: left;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s, color .15s;
}
.filter-option:hover,
.filter-option.active { background: var(--green-dim); color: var(--green); }
 
.filter-option .check {
  margin-left: auto;
  color: var(--green);
  opacity: 0;
  font-size: 13px;
}
.filter-option.active .check { opacity: 1; }
.filter-sep { height: 1px; background: var(--border); }
 
/* CATALOG GRID — mobile-first */
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding: 8px 16px 40px;
  max-width: 1140px;
  margin: 0 auto;
  justify-items: center;
}
 
/* ── CARD ── */
.card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  width: 100%;
  max-width: 340px;
  display: flex;          
  flex-direction: column;
  transition: transform .35s, border-color .35s, box-shadow .35s;
}
.card:hover {
  transform: translateY(-6px);
  border-color: var(--green);
  box-shadow: 0 8px 32px rgba(0,255,136,.15);
}
 
/* Imagem */
.card-img-wrap {
  width: 100%;
  height: 200px;
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: fill;
  transition: transform .4s;
}
.card:hover .card-img-wrap img { transform: scale(1.04); }
 
/* INFO */
.info {
  padding: 18px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
 
.info h3 {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
}
 
/* Descrição */
.info-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  min-height: 40px;
  display: -webkit-box;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
 
.specs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.specs span {
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  letter-spacing: .03em;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--muted);
}
 
/* Preço colado à base */
.price {
  margin-top: auto;
  padding-top: 8px;
}
.price .label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 2px;
}
.price strong {
  font-family: 'Syne', sans-serif;
  color: var(--green);
  font-size: 20px;
  font-weight: 700;
}
 
.actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.btn {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .04em;
  border: none;
  transition: transform .2s, box-shadow .2s, background .2s;
}
.btn:active { transform: scale(.97); }
 
.primary { background: var(--green); color: #000; }
.primary:hover { box-shadow: 0 0 20px var(--green-glow); }
 
.outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.outline:hover { border-color: var(--green); color: var(--green); }
 
/* ─── PAGINATION ─── */
.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 0 16px 48px;
}
.pagination button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  transition: border-color .2s, color .2s;
}
.pagination button:hover { border-color: var(--green); color: var(--green); }
.pagination button.active {
  background: var(--green);
  color: #000;
  border-color: var(--green);
}
 
/* RESPONSIVIDADE */
 
/* Tablet ≥ 640px — 2 colunas */
@media (min-width: 640px) {
  .catalog-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  /* search: vazio | input | filtro */
  .header-search {
    grid-template-columns: 1fr minmax(0, 340px) auto;
  }
  .search-spacer { display: block; }

  .card-img-wrap img {
  object-fit: fill;
  
}
}
 
/* Desktop ≥ 1024px — 3 colunas */
@media (min-width: 1024px) {
  .header { padding: 24px 20px 12px; }
 
  .catalog-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 8px 20px 48px;
  }
 
  .header-search {
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .search-spacer    { display: block; grid-column: 1; }
  .search-container { grid-column: 2; padding: 0 12px; }
  .filter-btn-wrapper {
    grid-column: 3;
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }
}
 
/* Wide ≥ 1200px */
@media (min-width: 1200px) {
  .card-img-wrap { height: 60%; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">

  <!-- TOPO -->
  <div class="header-top">
    <a href="../index.html">
      <button class="btn-back">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M8.5 2L3.5 6.5L8.5 11" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar
      </button>
    </a>

    <img src="../assets/logo-greenmotors.png" class="logo" alt="GreenMotors">

    <div></div>
  </div>

  <!-- SEARCH + FILTRO -->
  <div class="header-search">
    <div class="search-spacer"></div>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar motos...">
      <div id="suggestions"></div>
    </div>

    <div class="filter-btn-wrapper">
      <button class="btn-filter" id="btnFilter" onclick="toggleFiltro()">Filtrar ⌄</button>
      <div class="filter-dropdown" id="filterDropdown">
        <div class="filter-header">Ordenar por preço</div>
        <button class="filter-option" data-sort="asc" onclick="aplicarFiltro('asc')">
          ↑ Menor para maior <span class="check">✓</span>
        </button>
        <div class="filter-sep"></div>
        <button class="filter-option" data-sort="desc" onclick="aplicarFiltro('desc')">
          ↓ Maior para menor <span class="check">✓</span>
        </button>
        <div class="filter-sep"></div>
        <button class="filter-option" data-sort="none" onclick="aplicarFiltro('none')">
          ↺ Padrão <span class="check">✓</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="catalog-grid" id="catalogGrid"></div>
<div class="pagination"   id="pagination"></div>

<script>
/* ─── CANVAS BG ───*/
const canvas = document.getElementById("bg");
const ctx    = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = Array.from({ length: 60 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 2,
  d: Math.random() * 1,
}));

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(0,255,136,0.5)";
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    p.y += p.d;
    if (p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(draw);
}
draw();

/* ─── DOM ─── */
const grid           = document.getElementById("catalogGrid");
const paginationEl   = document.getElementById("pagination");
const searchInput    = document.getElementById("searchInput");
const suggestions    = document.getElementById("suggestions");
const btnFilter      = document.getElementById("btnFilter");
const filterDropdown = document.getElementById("filterDropdown");

/* ─── STATE ─── */
let produtos  = [];
let filtrados = [];
let sortMode  = "none";
const PER_PAGE = 6;
let currentPage = 1;

/* ─── LOAD  ─── */
async function carregar() {
  const res = await fetch("produtos.json");
  produtos  = await res.json();
  filtrados = [...produtos];
  const params     = new URLSearchParams(window.location.search);
  const paginaInicial = parseInt(params.get("page")) || 1;
  render(paginaInicial);
}
carregar();

/* ─── SORT ─── */
function parsePrice(p) {
  // precoPix é string no formato "8.990" ou "15.490,50"
  // 1) remove pontos (separador de milhar)
  // 2) troca vírgula por ponto (separador decimal, se existir)
  return parseFloat(String(p.precoPix).replace(/R\$\s*/g,"").replace(/\./g,"").replace(",",".")) || 0;
}
function sortArray(arr) {
  if (sortMode === "asc")  return [...arr].sort((a, b) => parsePrice(a) - parsePrice(b));
  if (sortMode === "desc") return [...arr].sort((a, b) => parsePrice(b) - parsePrice(a));
  return arr;
}

/* ─── WHATSAPP ──── */
const numero = "5521983348942";

function comprarWhatsApp(p) {
  const msg = encodeURIComponent(
    `Olá! Quero comprar a ${p.nome}.\n\n` +
    `💰 À vista: ${p.precoPix}\n` +
    `💳 Parcelado: ${p.precoParcelado}\n\n` +
    `Pode me dar mais detalhes?`
  );
  window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

/* ─── CARD  ── */
function createCard(p) {
  const rawImg = p.imagens ? p.imagens[0] : p.imagem;
  const img = rawImg.replace('/assets/Modelos/', 'Modelos/');
  return `
  <div class="card">
    <div class="card-img-wrap">
      <img src="${img}" alt="${p.nome}">
    </div>
    <div class="info">
      <h3>${p.nome}</h3>
      <p class="info-desc">${p.descricao}</p>
      <div class="specs">
        <span>${p.autonomia}</span>
        <span>${p.velocidade}</span>
      </div>
      <div class="price">
        <div class="label">Pix / à vista</div>
        <strong>${p.precoPix}</strong>
      </div>
      <div class="actions">
        <a href="produto.html?id=${p.id}&page=${currentPage}">
          <button class="btn outline">Ver</button>
        </a>
        <button class="btn primary" onclick='comprarWhatsApp(${JSON.stringify(p)})'>Comprar</button>
      </div>
    </div>
  </div>`;
}

/* ─── RENDER ─── */
function render(page) {
  currentPage = page;
  const sorted = sortArray(filtrados);
  const start  = (page - 1) * PER_PAGE;
  grid.innerHTML = sorted.slice(start, start + PER_PAGE).map(createCard).join("");
  renderPagination(sorted.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  paginationEl.innerHTML = Array.from({ length: pages }, (_, i) => {
    const n = i + 1;
    return `<button class="${n === currentPage ? 'active' : ''}" onclick="render(${n})">${n}</button>`;
  }).join("");
}

/* ─── BUSCA ─── */
searchInput.addEventListener("input", () => {
  const termo = searchInput.value.toLowerCase().trim();

  if (!termo) {
    suggestions.style.display = "none";
    filtrados = [...produtos];
    render(1);
    return;
  }

  const resultados = produtos.filter(p =>
    p.nome.toLowerCase().includes(termo)
  );

  if (resultados.length === 0) {
    suggestions.innerHTML = `<div style="color:var(--muted);cursor:default;pointer-events:none;">Nenhum produto encontrado</div>`;
    suggestions.style.display = "block";
    filtrados = [];
    grid.innerHTML = `
      <div style="
        grid-column:1/-1;
        text-align:center;
        padding:60px 20px;
        color:var(--muted);
        font-family:'Syne',sans-serif;
        font-size:15px;
        letter-spacing:.02em;
      ">
        Nenhum produto encontrado para
        &ldquo;<strong style="color:var(--text)">${searchInput.value}</strong>&rdquo;
      </div>`;
    paginationEl.innerHTML = "";
    return;
  }

  suggestions.innerHTML = resultados
    .slice(0, 5)
    .map(p => `<div onclick="selecionarProduto('${p.nome}')">${p.nome}</div>`)
    .join("");
  suggestions.style.display = "block";

  filtrados = resultados;
  render(1);
});

function selecionarProduto(nome) {
  searchInput.value = nome;
  suggestions.style.display = "none";
  filtrados = produtos.filter(p =>
    p.nome.toLowerCase().includes(nome.toLowerCase())
  );
  render(1);
}

document.addEventListener("click", e => {
  if (!e.target.closest(".search-container"))
    suggestions.style.display = "none";
  if (!e.target.closest(".filter-btn-wrapper")) {
    filterDropdown.classList.remove("open");
    btnFilter.classList.remove("open");
  }
});

/* ─── FILTRO ───*/
function toggleFiltro() {
  filterDropdown.classList.toggle("open");
  btnFilter.classList.toggle("open");
}

function aplicarFiltro(mode) {
  sortMode = mode;
  document.querySelectorAll(".filter-option").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.sort === mode);
  });
  const labels = { asc: "Menor ↑", desc: "Maior ↓", none: "Filtrar ⌄" };
  btnFilter.textContent = labels[mode];
  filterDropdown.classList.remove("open");
  btnFilter.classList.remove("open");
  render(1);
}
</script>

</body>
</html>
